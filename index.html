<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Poker Hand Review</title>
<style>
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --glass:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.1);
  --border-hi:rgba(196,160,80,0.4);
  --gold:#c4a050;
  --gold-lt:#ffdd88;
  --gold-dk:#8a6e30;
  --text:#ffffff;
  --muted:#e0dcd4;
  --label:#ece8e0;
  --red:#e88080;
  --blue:#7aaae8;
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  font-size:15px;
  font-weight:400;
  min-height:100vh;
  overflow-x:hidden;
}
body::after{
  content:'';position:fixed;top:-30vh;left:50%;transform:translateX(-50%);
  width:80vw;height:60vh;
  background:radial-gradient(ellipse,rgba(196,160,80,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--gold-dk);border-radius:2px;}

/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
.fu{animation:fadeUp .4s ease both;}
.fu1{animation-delay:.05s;}.fu2{animation-delay:.12s;}.fu3{animation-delay:.19s;}.fu4{animation-delay:.26s;}

/* ── header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  padding:14px 24px;display:flex;align-items:center;gap:14px;
  background:rgba(10,10,15,0.88);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.logo-mark{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 18px rgba(196,160,80,0.22);
}
.logo-title{font-size:18px;font-weight:700;letter-spacing:.06em;color:var(--text);}
.logo-sub{font-size:10px;color:#ffffff;letter-spacing:.16em;margin-top:2px;}
.hdr-btns{margin-left:auto;display:flex;gap:8px;}

/* ── glass card ── */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
  margin-bottom:14px;
  transition:border-color .2s;
}
.card:hover{border-color:rgba(196,160,80,0.18);}

/* ── section title ── */
.stitle{
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:#ffdd88;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,221,136,0.5),transparent);}

/* ── label ── */
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#ffffff;margin-bottom:8px;font-weight:600;}

/* ── buttons (base) ── */
.btn{
  border:none;border-radius:7px;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;
  padding:8px 15px;transition:all .18s;white-space:nowrap;
}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#ffffff;}
.btn-ghost:hover{border-color:var(--border-hi);color:var(--text);}
.btn-danger{background:rgba(217,96,96,0.1);border:1px solid rgba(217,96,96,0.25);color:var(--red);}
.btn-danger:hover{background:rgba(217,96,96,0.18);}
.btn-blue{background:rgba(91,141,217,0.12);border:1px solid rgba(91,141,217,0.3);color:var(--blue);}
.btn-blue:hover{background:rgba(91,141,217,0.2);}
.btn-gold{
  background:linear-gradient(135deg,var(--gold-dk),var(--gold));
  color:#0a0a0f;font-weight:600;
  box-shadow:0 4px 20px rgba(196,160,80,0.22);
}
.btn-gold:hover{box-shadow:0 4px 28px rgba(196,160,80,0.38);transform:translateY(-1px);}
.btn-gold:active{transform:translateY(0);}

/* ── count buttons ── */
.count-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;}
.cnt-btn{
  width:42px;height:42px;border-radius:8px;
  border:1px solid var(--border);background:var(--glass);
  color:#ffffff;font-size:15px;font-weight:600;cursor:pointer;
  transition:all .18s;font-family:monospace;
}
.cnt-btn:hover{border-color:var(--border-hi);color:var(--gold-lt);}
.cnt-btn.active{
  background:linear-gradient(135deg,var(--gold-dk),var(--gold));
  border-color:var(--gold);color:#0a0a0f;
  box-shadow:0 0 18px rgba(196,160,80,0.28);
}

/* ── position buttons ── */
.pos-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.pos-btn{
  padding:7px 15px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.25);background:transparent;
  color:#ffffff;font-size:13px;font-weight:600;font-family:monospace;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.pos-btn:hover{border-color:var(--border-hi);color:var(--text);}
.pos-btn.active{background:rgba(196,160,80,0.14);border-color:var(--gold);color:var(--gold-lt);}

/* ── inputs ── */
input,select,textarea{
  background:#ffffff;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:8px;color:#1a1a1a;
  font-family:inherit;font-size:14px;font-weight:400;
  padding:10px 13px;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%;
}
input::placeholder,textarea::placeholder{color:#aaa;font-style:italic;}
input:focus,select:focus,textarea:focus{
  border-color:rgba(196,160,80,0.7);
  box-shadow:0 0 0 3px rgba(196,160,80,0.15);
}
select{cursor:pointer;color:#1a1a1a;background:#ffffff;}
select option{background:#ffffff;color:#1a1a1a;}
textarea{resize:vertical;line-height:1.6;}

/* ── card picker ── */
.cp-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.cp-col{display:flex;flex-direction:column;gap:3px;}
.cp-btn{
  width:40px;height:30px;border:1px solid rgba(255,255,255,0.15);
  border-radius:5px;background:rgba(255,255,255,0.07);
  font-size:12px;font-weight:600;font-family:monospace;
  cursor:pointer;transition:all .15s;
}
.cp-btn:hover{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.09);}
.cp-btn.sel{
  background:rgba(196,160,80,0.22);border-color:var(--gold);
  box-shadow:0 0 8px rgba(196,160,80,0.22);color:#c4a050 !important;
}
.cp-area{
  margin-top:12px;padding:14px;
  background:rgba(0,0,0,0.28);border-radius:10px;
  border:1px solid var(--border);overflow-x:auto;
}

/* ── card chip display ── */
.card-chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.chip{
  font-family:monospace;font-size:14px;font-weight:600;
  padding:4px 10px;border-radius:5px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);
}
.chip-empty{color:#ffffff;font-size:13px;font-family:monospace;}

/* ── player notes ── */
.pnote-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.pnote-row:last-child{border-bottom:none;}
.pnum{font-family:monospace;font-size:12px;font-weight:700;color:#ffdd88;min-width:28px;padding-top:10px;}

/* ── street block ── */
.street-block{
  border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,0.02);padding:16px;margin-bottom:10px;
  transition:border-color .2s;
}
.street-block:hover{border-color:rgba(255,255,255,0.14);}
.street-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.street-tag{
  font-family:monospace;font-size:11px;letter-spacing:.12em;font-weight:700;
  padding:4px 12px;border-radius:4px;
  background:rgba(196,160,80,0.25);border:1px solid rgba(196,160,80,0.5);
  color:#ffdd88;
}
.action-list{display:flex;flex-direction:column;gap:7px;}
.action-row{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:10px;border-radius:8px;
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);
}
.action-row select{width:auto;flex:0 0 auto;min-width:90px;}
.action-row input{width:80px;flex:0 0 80px;font-family:monospace;}

/* ── add street ── */
.add-street{
  width:100%;padding:12px;background:transparent;
  border:1px dashed rgba(196,160,80,0.4);border-radius:var(--radius);
  color:#ffdd88;font-family:monospace;font-size:13px;font-weight:600;
  letter-spacing:.06em;cursor:pointer;transition:all .2s;
}
.add-street:hover{border-color:rgba(196,160,80,0.5);color:var(--gold);background:rgba(196,160,80,0.04);}

/* ── share big ── */
.share-big{
  width:100%;padding:16px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--gold-dk),var(--gold),var(--gold-dk));
  background-size:200% auto;
  color:#0a0a0f;font-family:inherit;font-size:16px;font-weight:700;
  letter-spacing:.1em;cursor:pointer;
  transition:all .3s;
  box-shadow:0 4px 28px rgba(196,160,80,0.22);
  animation:shimmer 3s linear infinite;
  margin-top:4px;
}
.share-big:hover{box-shadow:0 8px 40px rgba(196,160,80,0.42);transform:translateY(-2px);}

/* ── modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.78);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
  z-index:999;animation:fadeUp .2s ease;
}
.modal{
  background:#13131c;border:1px solid var(--border-hi);border-radius:16px;
  padding:28px;max-width:560px;width:90%;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:20px;font-weight:700;color:var(--gold-lt);}
.modal-sub{font-size:10px;color:#ffffff;letter-spacing:.15em;text-transform:uppercase;margin-top:3px;}
.copy-btn{
  width:100%;margin-top:14px;padding:11px;border:none;border-radius:8px;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold));
  color:#0a0a0f;font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.copy-btn:hover{box-shadow:0 4px 20px rgba(196,160,80,0.38);}
.copy-btn.copied{background:linear-gradient(135deg,#1a5c3a,#2d8f5e);color:#e8f8f0;}

/* ── divider ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:4px 0 20px;}

/* ── main wrap ── */
.main{max-width:700px;margin:0 auto;padding:28px 18px 60px;}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header class="hdr">
    <div class="logo-mark">🃏</div>
    <div>
      <div class="logo-title">Hand Review</div>
      <div class="logo-sub">Poker Session Notes</div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-gold" onclick="openShare()">共有</button>
      <button class="btn btn-ghost" onclick="resetAll()">リセット</button>
    </div>
  </header>

  <div class="main">
    <!-- Game Info -->
    <div class="card fu fu1">
      <div class="stitle">Game Info</div>
      <div class="lbl">Players</div>
      <div class="count-wrap" id="count-wrap"></div>
      <div class="lbl">Game / Tournament Info</div>
      <textarea id="comment" rows="1" placeholder="大会名・ブラインドレベルなど..." style="resize:none;"></textarea>
    </div>

    <!-- Player Notes -->
    <div class="card fu fu2">
      <div class="stitle" id="pnotes-title">Player Notes · 6P</div>
      <div id="pnotes-wrap"></div>
    </div>

    <!-- Hero Hand -->
    <div class="card fu fu3">
      <div class="stitle">Hero Hand</div>
      <div class="lbl">Position</div>
      <div class="pos-wrap" id="pos-wrap"></div>
      <div class="lbl">Hole Cards</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
        <div id="hand-display"><span class="chip-empty">未選択</span></div>
        <button class="btn btn-blue" onclick="toggleHandPicker()">カード選択</button>
        <button class="btn btn-danger" id="hand-clear" style="display:none" onclick="clearHand()">クリア</button>
      </div>
      <div class="cp-area" id="hand-picker" style="display:none"></div>
    </div>

    <!-- Board -->
    <div class="card fu fu4">
      <div class="stitle">Board</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
        <div id="board-display"><span class="chip-empty">未選択</span></div>
        <button class="btn btn-blue" onclick="toggleBoardPicker()">ボード選択</button>
        <button class="btn btn-danger" id="board-clear" style="display:none" onclick="clearBoard()">クリア</button>
      </div>
      <div class="cp-area" id="board-picker" style="display:none"></div>
    </div>

    <!-- Action -->
    <div class="card fu fu4">
      <div class="stitle">Action</div>
      <div id="streets-wrap"></div>
      <button class="add-street" id="add-street-btn" onclick="addStreet()">+ ストリート追加</button>
      <div style="margin-top:18px;">
        <div class="lbl">Comment</div>
        <textarea id="street-comment" rows="3" placeholder="このハンドの振り返り・改善点など..."></textarea>
      </div>
    </div>

    <button class="share-big" onclick="openShare()">Share This Hand</button>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeShare()">
    <div class="modal">
      <div class="modal-hdr">
        <div>
          <div class="modal-title">Hand Review</div>
          <div class="modal-sub">共有テキスト</div>
        </div>
        <button class="btn btn-ghost" onclick="closeShare()">閉じる</button>
      </div>
      <textarea id="share-text" rows="14" readonly
        style="font-family:monospace;font-size:12px;line-height:1.8;letter-spacing:.02em;"></textarea>
      <button class="copy-btn" id="copy-btn" onclick="copyText()">クリップボードにコピー</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const SUITS = ["♠","♥","♦","♣"];
const SUIT_COLORS = {"♠":"#2255cc","♥":"#dd2222","♦":"#ff6644","♣":"#117744"};
const RANKS = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
const POSITIONS = {
  2:["SB/BTN","BB"],
  3:["BTN","SB","BB"],
  4:["CO","BTN","SB","BB"],
  5:["LJ","CO","BTN","SB","BB"],
  6:["UTG","LJ","CO","BTN","SB","BB"],
  7:["UTG","UTG+1","LJ","CO","BTN","SB","BB"],
  8:["UTG","UTG+1","LJ","HJ","CO","BTN","SB","BB"],
  9:["UTG","UTG+1","UTG+2","LJ","HJ","CO","BTN","SB","BB"],
};
const ACTIONS = ["Fold","Check","Call","Raise","Bet","All-in"];
const ACTIONS_WITH_CA = ["Fold","Check","Check Around","Call","Raise","Bet","All-in"];
const STREETS = ["Preflop","Flop","Turn","River"];

// ── State ─────────────────────────────────────────────────────────
function loadNotes(){ try{ return JSON.parse(localStorage.getItem("pokerPlayerNotes")||"{}"); }catch(e){ return {}; } }
function saveNotes(notes){ try{ localStorage.setItem("pokerPlayerNotes", JSON.stringify(notes)); }catch(e){} }

let state = {
  playerCount: 6,
  myPosition: "",
  hand: [],
  handPickerOpen: false,
  board: [],
  boardPickerOpen: false,
  playerNotes: loadNotes(),
  streets: [newStreet("Preflop")],
};

function newStreet(name){ return {name, board:[], boardOpen:false, actions:[]}; }
function uid(){ return Math.random().toString(36).slice(2,9); }
function newAction(){ return {id:uid(), position:"", action:"", size:"", stack:""}; }

// ── Render helpers ────────────────────────────────────────────────
function el(id){ return document.getElementById(id); }

function renderAll(){
  renderCounts();
  renderPositions();
  renderPlayerNotes();
  renderHandDisplay();
  renderHandPicker();
  renderBoardDisplay();
  renderBoardPicker();
  renderStreets();
  el("add-street-btn").style.display = state.streets.length >= 4 ? "none" : "block";
}

// Player count buttons
function renderCounts(){
  const w = el("count-wrap");
  w.innerHTML = "";
  [2,3,4,5,6,7,8,9].forEach(n=>{
    const b = document.createElement("button");
    b.className = "cnt-btn" + (n===state.playerCount?" active":"");
    b.textContent = n;
    b.onclick = ()=>{ state.playerCount=n; state.myPosition=""; renderAll(); };
    w.appendChild(b);
  });
}

// Position buttons
function renderPositions(){
  const w = el("pos-wrap");
  w.innerHTML = "";
  const positions = POSITIONS[state.playerCount]||[];
  positions.forEach(p=>{
    const b = document.createElement("button");
    b.className = "pos-btn" + (p===state.myPosition?" active":"");
    b.textContent = p;
    b.onclick = ()=>{ state.myPosition=p; renderPositions(); };
    w.appendChild(b);
  });
}

// Player notes - always 9 players
function renderPlayerNotes(){
  const allNinePositions = POSITIONS[9];
  el("pnotes-title").textContent = `Player Notes · 9P`;
  const w = el("pnotes-wrap");
  w.innerHTML = "";
  allNinePositions.forEach((pos,i)=>{
    const row = document.createElement("div");
    row.className = "pnote-row";
    row.innerHTML = `<div class="pnum">P${i+1}</div>`;
    const ta = document.createElement("textarea");
    ta.rows = 2;
    ta.placeholder = `P${i+1} のメモ（スタック・傾向など）`;
    ta.value = state.playerNotes[pos]||"";
    ta.style.flex = "1";
    ta.oninput = ()=>{ state.playerNotes[pos]=ta.value; saveNotes(state.playerNotes); };
    row.appendChild(ta);
    w.appendChild(row);
  });
}

// Hand display chips
function renderHandDisplay(){
  const d = el("hand-display");
  const btn = el("hand-clear");
  if(!state.hand.length){
    d.innerHTML = `<span class="chip-empty">未選択</span>`;
    btn.style.display="none";
    return;
  }
  btn.style.display="";
  d.innerHTML = state.hand.map(c=>{
    const suit=c.slice(-1);
    return `<span class="chip" style="color:${SUIT_COLORS[suit]}">${c}</span>`;
  }).join(" ");
}

// Board display
function renderBoardDisplay(){
  const d = el("board-display");
  const btn = el("board-clear");
  if(!state.board.length){
    d.innerHTML = `<span class="chip-empty">未選択</span>`;
    btn.style.display="none";
    return;
  }
  btn.style.display="";
  d.innerHTML = state.board.map(c=>{
    const suit=c.slice(-1);
    return `<span class="chip" style="color:${SUIT_COLORS[suit]}">${c}</span>`;
  }).join(" ");
}

// Board picker grid
function renderBoardPicker(){
  const area = el("board-picker");
  area.style.display = state.boardPickerOpen ? "block" : "none";
  if(!state.boardPickerOpen) return;
  const wrap = document.createElement("div");
  wrap.className = "cp-wrap";
  SUITS.forEach(s=>{
    const col = document.createElement("div");
    col.className = "cp-col";
    RANKS.forEach(r=>{
      const card = r+s;
      const b = document.createElement("button");
      b.className = "cp-btn" + (state.board.includes(card)?" sel":"");
      b.style.color = state.board.includes(card) ? "#c4a050" : SUIT_COLORS[s];
      b.textContent = card;
      b.onclick = ()=>{
        if(state.board.includes(card)) state.board=state.board.filter(c=>c!==card);
        else if(state.board.length<5) state.board.push(card);
        renderBoardDisplay();
        renderBoardPicker();
      };
      col.appendChild(b);
    });
    wrap.appendChild(col);
  });
  area.innerHTML="";
  area.appendChild(wrap);
}

// Hand picker grid
function renderHandPicker(){
  const area = el("hand-picker");
  area.style.display = state.handPickerOpen ? "block" : "none";
  if(!state.handPickerOpen) return;
  const wrap = document.createElement("div");
  wrap.className = "cp-wrap";
  SUITS.forEach(s=>{
    const col = document.createElement("div");
    col.className = "cp-col";
    RANKS.forEach(r=>{
      const card = r+s;
      const b = document.createElement("button");
      b.className = "cp-btn" + (state.hand.includes(card)?" sel":"");
      b.style.color = state.hand.includes(card) ? "#c4a050" : SUIT_COLORS[s];
      b.textContent = card;
      b.onclick = ()=>{
        if(state.hand.includes(card)) state.hand=state.hand.filter(c=>c!==card);
        else if(state.hand.length<2) state.hand.push(card);
        renderHandDisplay();
        renderHandPicker();
      };
      col.appendChild(b);
    });
    wrap.appendChild(col);
  });
  area.innerHTML="";
  area.appendChild(wrap);
}

// Streets
function renderStreets(){
  const w = el("streets-wrap");
  w.innerHTML="";
  state.streets.forEach((st,si)=>{
    const block = document.createElement("div");
    block.className = "street-block";

    // header
    const hdr = document.createElement("div");
    hdr.className = "street-hdr";
    hdr.innerHTML = `<span class="street-tag">${st.name}</span>`;

    const removeBtn = document.createElement("button");
    removeBtn.className = "btn btn-danger";
    removeBtn.style.cssText="margin-left:auto;padding:5px 10px;";
    removeBtn.textContent = "✕";
    removeBtn.onclick = ()=>{ state.streets.splice(si,1); renderStreets(); el("add-street-btn").style.display = state.streets.length>=4?"none":"block"; };
    hdr.appendChild(removeBtn);
    block.appendChild(hdr);

    // action list
    const alist = document.createElement("div");
    alist.className = "action-list";
    const allPositions = POSITIONS[state.playerCount]||[];
    // 前のストリートで使われたポジションに絞る
    let positions = allPositions;
    if(st.name !== "Preflop"){
      const prevStreets = state.streets.slice(0, si);
      const usedInPrev = [...new Set(
        prevStreets.flatMap(s => s.actions.map(a=>a.position).filter(Boolean))
      )];
      if(usedInPrev.length > 0){
        positions = allPositions.filter(p => usedInPrev.includes(p));
      }
    }

    st.actions.forEach((a,ai)=>{
      const row = document.createElement("div");
      row.className = "action-row";

      if(a.action === "Check Around"){
        // Check Aroundはシンプルにラベルのみ表示
        const lbl = document.createElement("span");
        lbl.textContent = "✓ Check Around";
        lbl.style.cssText="color:#7aaae8;font-weight:600;font-size:13px;flex:1;";
        row.appendChild(lbl);
      } else {
        // position select
        const ps = document.createElement("select");
        ps.innerHTML = `<option value="">Position</option>` + positions.map(p=>`<option value="${p}"${a.position===p?" selected":""}>${p}</option>`).join("");
        ps.onchange = ()=>{ state.streets[si].actions[ai].position=ps.value; };
        row.appendChild(ps);

        // action select
        const actionList = st.name==="Preflop" ? ACTIONS : ACTIONS_WITH_CA;
        const as = document.createElement("select");
        as.innerHTML = `<option value="">Action</option>` + actionList.map(ac=>`<option value="${ac}"${a.action===ac?" selected":""}>${ac}</option>`).join("");
        as.onchange = ()=>{ state.streets[si].actions[ai].action=as.value; renderStreets(); };
        row.appendChild(as);

        // size input
        if(a.action==="Raise"||a.action==="Bet"||a.action==="Call"){
          const inp = document.createElement("input");
          inp.placeholder="点"; inp.value=a.size; inp.style.cssText="width:80px;flex:0 0 80px;font-family:monospace;";
          inp.oninput=()=>{ state.streets[si].actions[ai].size=inp.value; };
          row.appendChild(inp);
        }
        // all-in stack input
        if(a.action==="All-in"){
          const slbl = document.createElement("span");
          slbl.textContent="スタック(点):";
          slbl.style.cssText="color:#ffffff;font-size:12px;white-space:nowrap;";
          row.appendChild(slbl);
          const sinp = document.createElement("input");
          sinp.placeholder="点"; sinp.value=a.stack||""; sinp.style.cssText="width:80px;flex:0 0 80px;font-family:monospace;";
          sinp.oninput=()=>{ state.streets[si].actions[ai].stack=sinp.value; };
          row.appendChild(sinp);
        }
      }

      // remove button (共通)
      const rb = document.createElement("button");
      rb.className="btn btn-danger"; rb.textContent="✕";
      rb.style.cssText="margin-left:auto;padding:4px 9px;font-size:11px;";
      rb.onclick=()=>{ state.streets[si].actions.splice(ai,1); renderStreets(); };
      row.appendChild(rb);
      alist.appendChild(row);
    });

    block.appendChild(alist);

    // add action button
    const addBtn = document.createElement("button");
    addBtn.className="btn btn-blue"; addBtn.style.marginTop="12px"; addBtn.textContent="+ アクション追加";
    addBtn.onclick=()=>{ state.streets[si].actions.push(newAction()); renderStreets(); };
    block.appendChild(addBtn);

    // Check Around quick button (Flop以降のみ)
    if(st.name !== "Preflop"){
      const caBtn = document.createElement("button");
      caBtn.className="btn btn-ghost"; caBtn.style.cssText="margin-top:12px;margin-left:8px;";
      caBtn.textContent="✓ Check Around";
      caBtn.onclick=()=>{
        state.streets[si].actions.push({id:uid(),position:"",action:"Check Around",size:"",stack:""});
        renderStreets();
      };
      block.appendChild(caBtn);
    }

    w.appendChild(block);
  });
}

// ── Actions ───────────────────────────────────────────────────────
function toggleHandPicker(){
  state.handPickerOpen=!state.handPickerOpen;
  const btn = document.querySelector(".btn-blue");
  btn && (btn.textContent = state.handPickerOpen?"閉じる":"カード選択");
  renderHandPicker();
}
function clearHand(){ state.hand=[]; renderHandDisplay(); renderHandPicker(); }

function toggleBoardPicker(){
  state.boardPickerOpen=!state.boardPickerOpen;
  renderBoardPicker();
}
function clearBoard(){ state.board=[]; renderBoardDisplay(); renderBoardPicker(); }

function addStreet(){
  const used=state.streets.map(s=>s.name);
  const next=STREETS.find(s=>!used.includes(s));
  if(next){ state.streets.push(newStreet(next)); renderStreets(); }
  el("add-street-btn").style.display = state.streets.length>=4?"none":"block";
}

function resetAll(){
  if(!confirm("リセットしますか？\n（プレイヤーメモは保持されます）")) return;
  state={playerCount:6,myPosition:"",hand:[],handPickerOpen:false,board:[],boardPickerOpen:false,playerNotes:loadNotes(),streets:[newStreet("Preflop")]};
  el("comment").value="";
  el("street-comment").value="";
  renderAll();
}

// ── Share ─────────────────────────────────────────────────────────
function buildShareText(){
  const positions = POSITIONS[state.playerCount]||[];
  const L=[];
  L.push("╔═══════════════════════════╗");
  L.push("║   🃏  POKER HAND REVIEW    ║");
  L.push("╚═══════════════════════════╝");

  // Game Info
  L.push(`Players : ${state.playerCount}`);
  const note = el("comment").value;
  if(note) L.push(`Game    : ${note}`);

  // Player Notes (always 9 players)
  const ninePositions = POSITIONS[9];
  const filled = ninePositions.filter(p=>state.playerNotes[p]);
  if(filled.length){
    L.push("\n── Player Notes ──");
    ninePositions.forEach((p,i)=>{ if(state.playerNotes[p]) L.push(`  P${i+1}: ${state.playerNotes[p]}`); });
  }

  // Hero
  L.push("\n── Hero ──");
  if(state.myPosition) L.push(`  Position : ${state.myPosition}`);
  if(state.hand.length) L.push(`  Hand     : ${state.hand.join(" ")}`);
  if(state.board.length) L.push(`  Board    : ${state.board.join(" ")}`);

  // Streets
  L.push("\n── Action ──");
  state.streets.forEach(s=>{
    L.push(`▸ ${s.name}`);
    s.actions.forEach(a=>{
      if(a.action==="Check Around"){
        L.push(`  ✓ Check Around`);
      } else if(a.position||a.action){
        let ln=`  ${a.position||"?"} → ${a.action||"?"}`;
        if(a.size) ln+=` ${a.size}点`;
        if(a.action==="All-in"&&a.stack) ln+=` (スタック: ${a.stack}点)`;
        L.push(ln);
      }
    });
    if(!s.actions.length) L.push("  —");
    L.push("");
  });

  const sc = el("street-comment").value;
  if(sc) L.push(`💬 Comment:\n${sc}\n`);
  L.push("═══════════════════════════");
  return L.join("\n");
}

function openShare(){
  el("share-text").value = buildShareText();
  el("copy-btn").textContent="クリップボードにコピー";
  el("copy-btn").classList.remove("copied");
  el("modal").style.display="flex";
}
function closeShare(){ el("modal").style.display="none"; }
function copyText(){
  navigator.clipboard.writeText(el("share-text").value).then(()=>{
    el("copy-btn").textContent="✓ コピーしました";
    el("copy-btn").classList.add("copied");
    setTimeout(()=>{ el("copy-btn").textContent="クリップボードにコピー"; el("copy-btn").classList.remove("copied"); },2000);
  });
}

// ── Init ──────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
